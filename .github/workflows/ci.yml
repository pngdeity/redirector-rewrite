name: Verify and Package

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git tag or branch to build (e.g. v1.0.0 or main)'
        required: true
        default: 'main'
        type: string
      version:
        description: 'Override version string (default: auto-detect from tag, or 0.0.0 for branches)'
        required: false
        default: ''
        type: string

jobs:
  verify-and-package:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Source
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Determine Version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VER="${{ inputs.version }}"
          elif echo "${{ inputs.ref }}" | grep -qE '^v[0-9]'; then
            VER="${inputs.ref#v}"
          else
            VER="0.0.0"
          fi
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "Resolved version: $VER"

      - name: Stamp Version
        run: node scripts/stamp-version.js ${{ steps.version.outputs.version }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Execute Build Pipeline
        run: node scripts/ci-runner.js

      - name: Upload Extension Artifact
        uses: actions/upload-artifact@v7
        with:
          name: extension-package
          path: |
            dist/redirector-rewrite.zip
